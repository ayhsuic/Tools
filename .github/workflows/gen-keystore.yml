name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'my-alias'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Combined LOCAL_PROPERTIES
        run: |
          # 将密钥文件转换成 Base64
          KEYSTORE_B64=$(base64 -w 0 release.keystore)
          
          # 构造 LOCAL_PROPERTIES 的完整内容
          echo "### 请复制下方全部内容到 GitHub Secret: LOCAL_PROPERTIES" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`properties" >> $GITHUB_STEP_SUMMARY
          echo "signing.storePassword=${{ github.event.inputs.password }}" >> $GITHUB_STEP_SUMMARY
          echo "signing.keyAlias=${{ github.event.inputs.alias }}" >> $GITHUB_STEP_SUMMARY
          echo "signing.keyPassword=${{ github.event.inputs.password }}" >> $GITHUB_STEP_SUMMARY
          echo "signing.keystore.base64=$KEYSTORE_B64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "> [!IMPORTANT]" >> $GITHUB_STEP_SUMMARY
          echo "> 你的 build.yml 只需要一个 LOCAL_PROPERTIES 变量，不需要单独设置 RELEASE_KEYSTORE_BASE64。" >> $GITHUB_STEP_SUMMARY
