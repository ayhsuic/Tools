name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'my-alias'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Base64
        run: |
          echo "------------------------------------------------------------"
          echo "YOUR BASE64 KEYSTORE STRING (Copy the line below):"
          echo "------------------------------------------------------------"
          base64 -w 0 release.keystore
          echo ""
          echo "------------------------------------------------------------"
          echo "Copy the string above and save it to GitHub Secret: RELEASE_KEYSTORE_BASE64"
          echo "------------------------------------------------------------"
          echo "Your LOCAL_PROPERTIES content should be:"
          echo ""
          echo "signing.storeFile=release.keystore"
          echo "signing.storePassword=${{ github.event.inputs.password }}"
          echo "signing.keyAlias=${{ github.event.inputs.alias }}"
          echo "signing.keyPassword=${{ github.event.inputs.password }}"
