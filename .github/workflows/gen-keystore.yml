name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'my-alias'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Base64
        run: |
          KEYSTORE_B64=$(base64 -w 0 release.keystore)
          cat <<EOF > props.txt
          KEYSTORE_PASS=${{ github.event.inputs.password }}
          ALIAS_NAME=${{ github.event.inputs.alias }}
          ALIAS_PASS=${{ github.event.inputs.password }}
          EOF
          PROPS_B64=$(base64 -w 0 props.txt)
          
          echo "### 1. RELEASE_KEYSTORE_BASE64" >> $GITHUB_STEP_SUMMARY
          echo "请点击代码块右上角的 **Copy** 按钮复制下方全部内容，填入 \`RELEASE_KEYSTORE_BASE64\` Secret 中：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          echo "$KEYSTORE_B64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "### 2. LOCAL_PROPERTIES" >> $GITHUB_STEP_SUMMARY
          echo "请点击代码块右上角的 **Copy** 按钮复制下方全部内容，填入 \`LOCAL_PROPERTIES\` Secret 中：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          echo "$PROPS_B64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
