name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'mbox'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Double-Encoded LOCAL_PROPERTIES
        run: |
          # 1. 将密钥文件转换成内层 Base64
          KEYSTORE_B64=$(base64 -w 0 release.keystore)
          
          # 2. 构造明文 Properties 文本并存入临时文件
          cat <<EOF > local.properties.tmp
          signing.storePassword=${{ github.event.inputs.password }}
          signing.keyAlias=${{ github.event.inputs.alias }}
          signing.keyPassword=${{ github.event.inputs.password }}
          signing.keystore.base64=$KEYSTORE_B64
          EOF
          
          # 3. 对整个文件执行外层 Base64 编码 (二次编码)
          FINAL_B64=$(base64 -w 0 local.properties.tmp)
          
          # 4. 输出到 Summary
          echo "### ✅ 步骤：设置 GitHub Secret" >> $GITHUB_STEP_SUMMARY
          echo "请直接复制下方内容并填入 GitHub 仓库的 **\`LOCAL_PROPERTIES\`** Secret 中：" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`text" >> $GITHUB_STEP_SUMMARY
          echo "$FINAL_B64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "#### ℹ️ 调试参考 (这是二次编码前的明文)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`properties" >> $GITHUB_STEP_SUMMARY
          cat local.properties.tmp >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
