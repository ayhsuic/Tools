name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'my-alias'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Base64
        run: |
          echo "------------------------------------------------------------"
          echo "YOUR BASE64 KEYSTORE STRING (Copy the line below):"
          echo "------------------------------------------------------------"
          base64 -w 0 release.keystore
          echo ""
          echo "------------------------------------------------------------"
          echo "YOUR LOCAL_PROPERTIES STRING (Copy the line below):"
          echo "------------------------------------------------------------"
          cat <<EOF > props.txt
          KEYSTORE_PASS=${{ github.event.inputs.password }}
          ALIAS_NAME=${{ github.event.inputs.alias }}
          ALIAS_PASS=${{ github.event.inputs.password }}
          EOF
          base64 -w 0 props.txt
          echo ""
          echo "------------------------------------------------------------"
          echo "Copy the string above and save it to GitHub Secret: LOCAL_PROPERTIES"
          echo "------------------------------------------------------------"
