name: Generate Keystore Helper

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key Alias'
        required: true
        default: 'my-alias'
      password:
        description: 'Key and Store Password'
        required: true
        default: 'password123'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias "${{ github.event.inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Build, OU=Actions, O=Organization, L=City, S=State, C=US" \
            -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}"
          
      - name: Output Base64
        run: |
          KEYSTORE_B64=$(base64 -w 0 release.keystore)
          
          # Use printf to be completely certain there is no leading/trailing whitespace
          > props.txt
          printf "KEYSTORE_PASS=%s\n" "${{ github.event.inputs.password }}" >> props.txt
          printf "ALIAS_NAME=%s\n" "${{ github.event.inputs.alias }}" >> props.txt
          printf "ALIAS_PASS=%s\n" "${{ github.event.inputs.password }}" >> props.txt
          
          PROPS_B64=$(base64 -w 0 props.txt)
          
          echo "------------------------------------------------------------"
          echo "YOUR BASE64 KEYSTORE STRING (Copy the line below):"
          echo "------------------------------------------------------------"
          echo "$KEYSTORE_B64"
          echo "------------------------------------------------------------"
          echo ""
          echo "------------------------------------------------------------"
          echo "YOUR LOCAL_PROPERTIES STRING (Copy the line below):"
          echo "------------------------------------------------------------"
          echo "$PROPS_B64"
          echo "------------------------------------------------------------"
